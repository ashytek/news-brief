name: news-pipeline

# Runs the News Brief pipeline 4×/day from GitHub's infrastructure —
# no laptop required. Transcripts come from the Apify managed API
# (APIFY_TOKEN secret), so a datacenter IP is not a problem.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, GOOGLE_API_KEY,
#   YOUTUBE_API_KEY, APIFY_TOKEN
# Optional:
#   ASSEMBLYAI_API_KEY   (audio fallback for caption-less fresh videos)
#   HEALTHCHECK_URL      (healthchecks.io dead-man's switch)

on:
  schedule:
    # 4 runs/day. Offset from :00 — GitHub delays/skips on-the-hour crons
    # under load. Times are UTC (≈ 04:17, 10:17, 16:17, 22:17 UK summer).
    - cron: "17 3,9,15,21 * * *"
  workflow_dispatch: {}   # manual "Run workflow" button for testing

concurrency:
  group: news-pipeline
  cancel-in-progress: false   # never kill a run mid-summarisation

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (single cycle)
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_API_KEY:            ${{ secrets.GOOGLE_API_KEY }}
          YOUTUBE_API_KEY:           ${{ secrets.YOUTUBE_API_KEY }}
          APIFY_TOKEN:               ${{ secrets.APIFY_TOKEN }}
          ASSEMBLYAI_API_KEY:        ${{ secrets.ASSEMBLYAI_API_KEY }}
          HEALTHCHECK_URL:           ${{ secrets.HEALTHCHECK_URL }}
          # No YOUTUBE_BROWSER here — headless runner has no Chrome profile.
          # The local fallback chain (yt-dlp android client) is cookie-free.
        run: python run_pipeline.py --once

      - name: Ping healthcheck on job failure
        # Catches crashes that die before the in-process ping fires
        if: failure()
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          if [ -n "$HEALTHCHECK_URL" ]; then
            curl -fsS -m 10 "${HEALTHCHECK_URL%/}/fail" || true
          fi
